<?xml version="1.0" encoding="UTF-8"?>
<!-- SGHUB stylized OpenAI provider mark. Not an exact logo reproduction.
     A simplified rosette/knot pattern: 3 overlapping arcs forming a triangular knot.
     viewBox 24×24, stroke 1.5px, inherits currentColor. -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="1.5"
  stroke-linecap="round"
  stroke-linejoin="round"
  aria-hidden="true"
>
  <!-- Three overlapping circles arranged in a triangle to suggest a knot -->
  <circle cx="12" cy="8.5" r="5" />
  <circle cx="7.5" cy="15.5" r="5" />
  <circle cx="16.5" cy="15.5" r="5" />
  <!-- Center dot connecting the three -->
  <circle cx="12" cy="12.5" r="1" fill="currentColor" stroke="none" />
</svg>
