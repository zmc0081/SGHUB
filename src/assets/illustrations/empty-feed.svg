<?xml version="1.0" encoding="UTF-8"?>
<!-- SGHUB empty-state illustration: Feed (Today's Push)
     A simplified inbox tray with one letter sliding in, plus two short signal
     wave lines above suggesting "waiting for new content".
     viewBox 200×160, stroke 1.5px, inherits currentColor. -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 200 160"
  fill="none"
  stroke="currentColor"
  stroke-width="1.5"
  stroke-linecap="round"
  stroke-linejoin="round"
  aria-hidden="true"
>
  <!-- Signal wave arcs (above the tray) -->
  <path d="M88 32 Q100 24 112 32" />
  <path d="M80 38 Q100 22 120 38" />

  <!-- Letter (envelope sliding into tray) -->
  <!-- Envelope rectangle, slightly tilted-up -->
  <path d="M76 64 L124 64 L124 86 L76 86 Z" />
  <!-- Envelope flap (the V) -->
  <path d="M76 64 L100 78 L124 64" />

  <!-- Inbox tray (open-front box) -->
  <!-- Tray front face -->
  <path d="M50 96 L150 96 L150 122 L50 122 Z" />
  <!-- Tray top opening (depth lines) -->
  <path d="M50 96 L62 86 L138 86 L150 96" />
  <!-- Slot opening on top -->
  <path d="M85 91 L115 91" />
</svg>
