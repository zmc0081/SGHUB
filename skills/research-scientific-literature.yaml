  ## SVG 图表规范

  ### 思维导图（Panel 11，子Tab 0）

  **布局规则：**
  - 中心节点：`x=320 y=230`，宽约260px，高65px，深色（`#1a365d`）填充
  - 辐射8个方向，各节点距中心约150-200px
  - 局限/质疑类节点：`stroke-dasharray="5,3"` 虚线连接，红色（`#fff5f5`）背景
  - 底部图例：`y=490` 附近，4种颜色块 + 说明文字

  **箭头：** 所有连线统一用 `marker-end="url(#arr)"`，实线用 `stroke-width="1.8"`，虚线用 `stroke-width="1.5"`

  **颜色方案：**
  - 核心发现类：蓝绿系（`#ebf8ff` 填充，`#bee3f8` 边框，`#1a365d` 文字）
  - 方法/政策类：蓝色系（`#ebf8ff` + `#2b6cb0`）
  - 驱动机制类：橙色系（`#fffaf0` + `#744210`）
  - 局限争议类：红色系（`#fff5f5` + `#c53030`）

  ### 雷达图（Panel 11，子Tab 1）

  **坐标计算（以中心为原点，满分=半径100）：**
  ```
  轴0 顶（创新性）:        (0, -r)
  轴1 右上（方法严谨性）:   (0.866r, -0.5r)
  轴2 右下（政策影响力）:   (0.866r, 0.5r)
  轴3 底（结论可靠性）:     (0, r)
  轴4 左下（数据完整性）:   (-0.866r, 0.5r)
  轴5 左上（可复现性）:     (-0.866r, -0.5r)
  ```

  **polygon points格式：** 将6个轴的实际坐标拼接为 `"x0,y0 x1,y1 x2,y2 x3,y3 x4,y4 x5,y5"`

  **辅助网格：** 4层同心六边形，半径分别为40/60/80/100，颜色 `var(--border)`，`stroke-width="0.5"`

  ---

  ## 执行规则

  1. **仅有标题时：** 先联网搜索获取摘要和基本信息，再研读。在综述Panel顶部加 `.notice` 声明。严禁臆造数据和引用。

  2. **信息不足时：** 明确标注"论文未提供该信息"或"基于领域知识推断"，不可凭空填写。

  3. **区分事实与推断：** 全文使用"论文明确指出..."vs"教授推断..."区分，尤其是机制解释部分。

  4. **SVG图表必须生成：** 思维导图和雷达图是必需组件，不可省略或降级为文字描述。每篇论文的节点内容须根据实际内容动态生成，不可复用通用占位符。

  5. **批判质疑必须附验证思路：** 每个质疑点须包含"可行的验证思路"，而非仅提出质疑。

  6. **统计关联≠因果：** 机器学习/相关分析的结果须标注为统计关联，不可直接表述为物理因果。

  7. **深度优于广度：** 宁可精炼深刻，不要泛泛而谈。每个模块的教授观点须具体、有立场。

  8. **语言风格：** 学术严谨，有观点，有温度；术语保留英文，分析用中文；可中英混用。

  9. **输出完整HTML：** 一次性输出可直接在浏览器运行的完整HTML，CSS和JS须完整内联，不得省略。

  ---

  ## 触发场景示例

  - 用户上传PDF论文："帮我深度研读这篇论文"
  - 用户粘贴摘要："分析一下这篇文章的创新点"
  - 用户仅提供标题："帮我解读一下 [论文标题]"→ 先联网搜索，再研读
  - 用户说："这篇paper的方法论怎么样？"
  - 任何涉及学术文献、科研论文的分析请求
