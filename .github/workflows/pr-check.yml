name: PR Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  check:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            libdbus-1-dev \
            libsecret-1-dev

      # NOTE: dtolnay/rust-toolchain@stable broke on macos-latest after
      # GitHub upgraded the runner image to macOS 15 / ARM (the bundled
      # `cargo` is a rustup-init shim and dtolnay doesn't repair PATH).
      # actions-rust-lang/setup-rust-toolchain runs `rustup-init` itself
      # and exports CARGO_HOME/RUSTUP_HOME explicitly — works on all 3
      # platforms.
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          cache-workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Lint (clippy)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Lint (eslint)
        run: npx eslint src/

      - name: Build (Rust)
        working-directory: src-tauri
        run: cargo build

      - name: Build (Frontend)
        run: npm run build

      - name: Test (Rust)
        working-directory: src-tauri
        run: cargo test --lib
