<?xml version="1.0" encoding="UTF-8"?>
<!-- SGHUB stylized Ollama provider mark (llama profile, v3 — left-facing).
     Clear silhouette: rounded skull with one upright ear, distinct muzzle
     pointing left, long sloping neck. Drawn on a 24×24 grid with explicit
     anatomy: ear at top-left, muzzle leftmost, neck dropping to bottom.
     viewBox 24×24, stroke 1.5px, inherits currentColor. -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="1.5"
  stroke-linecap="round"
  stroke-linejoin="round"
  aria-hidden="true"
>
  <!-- Outline traced from front-base-of-neck, going up + around head + back down -->
  <path d="
    M 12 22
    L 12 13
    Q 11 13, 10 12
    Q 7 11, 5 10
    Q 6 9, 8 8
    Q 9 6, 10 5
    L 13 5
    Q 15 6, 15 8
    L 15 22
  " />

  <!-- Ear (upright triangle on top of head, pointing up-left) -->
  <path d="M 10 5 L 8.5 2 L 11.5 4.5 Z" />

  <!-- Eye -->
  <circle cx="8.5" cy="7.5" r="0.7" fill="currentColor" stroke="none" />
</svg>
