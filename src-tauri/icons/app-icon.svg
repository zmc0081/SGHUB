<?xml version="1.0" encoding="UTF-8"?>
<!-- SG Hub desktop-icon source (V2.2.2). 1024x1024 squared master for
     `npx tauri icon src-tauri/icons/app-icon.svg`, which regenerates the
     full platform icon set in this directory.

     Brand colors per the "SG Hub logo design 应用版" design spec:
       navy  #14213D  (squircle background)
       paper #F2EBD8  (folder outline)
       gold  #C9A24C  (vertical bookmark)

     The two mark paths mirror src/components/BrandLogo.tsx — keep in sync.
     Mark is the 64-unit mark scaled x12 and centered (translate 128,104).
     The bookmark is drawn BEFORE the folder so the folder's body-top edge
     crosses in front of it (the bookmark appears to hang from that edge). -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="#14213D"/>
  <g transform="translate(128 104) scale(12)">
    <path d="M36 22 H44 V36 L40 33 L36 36 Z" fill="#C9A24C"/>
    <path d="M14 16 H25 L29 22 H50 A4 4 0 0 1 54 26 V48 A4 4 0 0 1 50 52 H14 A4 4 0 0 1 10 48 V20 A4 4 0 0 1 14 16 Z"
          fill="none" stroke="#F2EBD8" stroke-width="4"
          stroke-linejoin="round" stroke-linecap="round"/>
  </g>
</svg>
